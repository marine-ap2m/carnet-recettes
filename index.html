<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2F7A45">
<meta name="description" content="Tes recettes Instagram rangées comme un livre, avec liste de courses automatique.">
<title>Mes Recettes</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="device">

  <!-- ===== Vue Livre ===== -->
  <header class="app-head" id="bookHead">
    <div class="brand-row">
      <div class="brand serif">Mes <em>recettes</em></div>
      <div class="count" id="count"></div>
    </div>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="Chercher une recette…" aria-label="Chercher une recette">
    </div>
    <div class="chips" id="chips"></div>
  </header>

  <main class="view on" id="view-book" aria-label="Livre de recettes">
    <div class="grid" id="grid"></div>
    <div class="empty" id="bookEmpty" hidden></div>
  </main>

  <!-- ===== Vue Courses ===== -->
  <main class="view" id="view-list" aria-label="Liste de courses">
    <div id="listWrap"></div>
  </main>

  <!-- Barre de sélection -->
  <div class="selbar" id="selbar">
    <span id="selTxt"></span>
    <span class="selbar-actions">
      <button class="clear" id="clearSel">Vider</button>
      <button id="genBtn" class="strong">Ma liste →</button>
    </span>
  </div>

  <!-- Nav -->
  <nav class="nav">
    <button id="tabBook" class="on"><span class="ico" aria-hidden="true">📖</span>Livre</button>
    <button class="add" id="addBtn" aria-label="Ajouter une recette">+</button>
    <button id="tabList" class="rel"><span class="ico" aria-hidden="true">🧺</span>Courses<span class="badge" id="listBadge"></span></button>
  </nav>

  <!-- Overlay + sheets -->
  <div class="overlay" id="overlay"></div>

  <section class="sheet" id="detailSheet" aria-label="Fiche recette">
    <div class="grab"></div>
    <div class="sheet-body" id="detailBody"></div>
  </section>

  <section class="sheet" id="importSheet" aria-label="Ajouter une recette">
    <div class="grab"></div>
    <div class="sheet-body">
      <h2 class="serif">Nouvelle recette</h2>
      <p class="hint">Sur Instagram : <strong>Partager → Copier le lien</strong>, puis colle-le ici. Colle aussi la légende du post (appui long sur le texte → copier) : les ingrédients et les étapes seront détectés automatiquement.</p>
      <label class="field"><span>Lien Instagram (optionnel)</span>
        <input id="impUrl" type="url" placeholder="https://www.instagram.com/reel/…">
      </label>
      <label class="field"><span>Légende du post (optionnel)</span>
        <textarea id="impCaption" rows="7" placeholder="Colle ici la légende : titre, ingrédients, étapes…"></textarea>
      </label>
      <div class="sheet-actions">
        <button class="btn ghost" id="impManual">Créer à la main</button>
        <button class="btn" id="impParse">Analyser ✨</button>
      </div>
    </div>
  </section>

  <section class="sheet" id="editSheet" aria-label="Modifier la recette">
    <div class="grab"></div>
    <div class="sheet-body">
      <h2 class="serif" id="editTitle">Nouvelle recette</h2>
      <label class="field"><span>Titre *</span>
        <input id="edTitle" type="text" placeholder="Ex : Curry de pois chiches coco">
      </label>
      <div class="field-row">
        <label class="field"><span>Compte Instagram</span>
          <input id="edHandle" type="text" placeholder="@compte">
        </label>
        <label class="field"><span>Temps (min)</span>
          <input id="edTime" type="number" min="1" max="600" placeholder="30">
        </label>
      </div>
      <div class="field-row">
        <label class="field"><span>Portions</span>
          <input id="edServes" type="number" min="1" max="20" value="4">
        </label>
        <label class="field"><span>Emoji</span>
          <input id="edEmoji" type="text" maxlength="4" placeholder="🍽️">
        </label>
      </div>
      <label class="field"><span>Lien Instagram</span>
        <input id="edUrl" type="url" placeholder="https://www.instagram.com/reel/…">
      </label>
      <div class="field"><span class="field-label">Catégories</span>
        <div class="tagpick" id="edTags"></div>
      </div>
      <label class="field"><span>Ingrédients — un par ligne, avec la quantité</span>
        <textarea id="edIng" rows="7" placeholder="400 g de spaghetti&#10;2 citrons&#10;1 c.à.s de miel"></textarea>
      </label>
      <label class="field"><span>Étapes — une par ligne</span>
        <textarea id="edSteps" rows="6" placeholder="Cuire les pâtes al dente.&#10;Préparer la sauce…"></textarea>
      </label>
      <div class="sheet-actions">
        <button class="btn ghost" id="edCancel">Annuler</button>
        <button class="btn" id="edSave">Enregistrer</button>
      </div>
    </div>
  </section>

  <div class="toast" id="toast" role="status"></div>
</div>

<script src="app.js"></script>
</body>
</html>
